name: provider-opnsense-native
runtime: yaml
plugins:
  providers:
    - name: opnsense
      path: ../../bin

config:
    opnsense:address: "asdf"
    opnsense:key: "key"
    opnsense:secret: "secret"

resources:
  myHostAliasOverride:
    type: opnsense:unbound:HostAliasOverride
    properties:
      description: "Pulumi test"
      domain: "example.com"
      enabled: true
      host: "host"
      hostname: "hostname"

outputs:
  output:
    value: ${myHostAliasOverride.result}
